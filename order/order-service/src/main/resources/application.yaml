server:
  port: ${ORDER_SERVICE_PORT:8085}

spring:
  application:
    name: order-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:order-service-db/changelog.xml

rest:
  client:
    reservation-service:
      base-url: http://localhost:${RESERVATION_SERVICE_PORT:8084}

exception:
  dto-factory:
    service-id: order-service

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
  tracing:
    sampling:
      probability: 1