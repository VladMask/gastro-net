server:
  port: ${RESTAURANT_SERVICE_PORT:8083}

spring:
  application:
    name: restaurant-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:restaurant-service-db/changelog.xml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minio}
  secret-key: ${MINIO_SECRET_KEY:minio/root}
  bucket: ${MINIO_BUCKET:gastro-net}

rest:
  client:
    authentication-service:
      base-url: ${AUTH_SERVICE_URL:http://localhost:8082}

exception:
  dto-factory:
    service-id: restaurant-service

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
  tracing:
    sampling:
      probability: 1