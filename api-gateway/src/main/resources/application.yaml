server:
  port: ${GATEWAY_PORT}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: authentication-service
              uri: ${AUTH_SERVICE_URL}
              predicates:
                - Path=/api/v1/authentication/**

            - id: user-service
              uri: ${USER_SERVICE_URL}
              predicates:
                - Path=/api/v1/users/**

            - id: restaurant-service
              uri: ${RESTAURANT_SERVICE_URL}
              predicates:
                - Path=/api/v1/restaurants/**,/api/v1/meals/**,/api/v1/reviews/**,/api/v1/meal-categories/**

            - id: reservation-service
              uri: ${RESERVATION_SERVICE_URL}
              predicates:
                - Path=/api/v1/reservations/**,/api/v1/restaurant-tables/**,/api/v1/floor-schema/**

            - id: order-service
              uri: ${ORDER_SERVICE_URL}
              predicates:
                - Path=/api/v1/orders/**

            - id: payment-service
              uri: ${PAYMENT_SERVICE_URL}
              predicates:
                - Path=/api/v1/payments/**

            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL}
              predicates:
                - Path=/api/v1/notifications/**

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
  tracing:
    sampling:
      probability: 1

jwt:
  secret: ${JWT_SECRET}

exception:
  dto-factory:
    service-id: api-gateway