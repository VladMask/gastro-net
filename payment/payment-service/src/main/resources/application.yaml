server:
  port: ${PAYMENT_SERVICE_PORT:8086}

spring:
  application:
    name: payment-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:payment-service-db/changelog.xml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

rest:
  client:
    reservation-service:
      base-url: ${RESERVATION_SERVICE_URL}
    order-service:
      base-url: ${ORDER_SERVICE_URL}

common:
  outbox:
    producer:
      kafka-topic: payments
    scheduler:
      lock-at-most-for: 2m
      initial-delay: 10000
      fixed-delay: 5000
      enabled: true

exception:
  dto-factory:
    service-id: payment-service

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
  tracing:
    sampling:
      probability: 1

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY}
  currency: ${STRIPE_CURRENCY:byn}