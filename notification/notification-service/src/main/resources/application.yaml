server:
  port: ${NOTIFICATION_SERVICE_PORT:8087}

spring:
  application:
    name: notification-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:notification-service-db/changelog.xml

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

notification-service:
  consumer:
    kafka-topic: payments,reservations
  scheduler:
    enabled: true
    fixed-delay: 10000
    initial-delay: 15000
    lock-at-most-for: 2m

rest:
  client:
    user-service:
      base-url: http://localhost:${USER_SERVICE_PORT:8081}

exception:
  dto-factory:
    service-id: notification-service

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
  tracing:
    sampling:
      probability: 1